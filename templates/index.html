<!DOCTYPE html>
<html>
<head>
    <title>LinkedIn Profile Priority Picker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>🎯 LinkedIn Profile Priority Picker</h1>

<form method="POST">
    <input type="text" name="skills" placeholder="Required skills (comma separated)" required><br><br>

    <input type="number" name="min_exp" placeholder="Minimum experience (years)" required><br><br>

    <select name="qualification">
        <option value="">Preferred Qualification</option>
        <option value="PhD">PhD</option>
        <option value="M.Tech">M.Tech</option>
        <option value="B.Tech">B.Tech</option>
    </select><br><br>

    <button type="submit">Find Best Candidates</button>
</form>

{% if ranked %}
<h2>🏆 Ranked Candidates</h2>
<table>
    <tr>
        <th>Name</th>
        <th>Qualification</th>
        <th>Experience</th>
        <th>Score</th>
    </tr>

    {% for c in ranked %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.qualification }}</td>
        <td>{{ c.experience }} yrs</td>
        <td>{{ c.score }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

</body>
</html>
